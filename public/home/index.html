<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../index.css">
  <link rel="icon" href="../img/logo.png" type="image/png">
  <title>Arnav's Portfolio</title>
</head>
<body>
  <div id="splash-screen" class="splash-screen">
    <div class="tv-frame">
      <div class="tv-screen">
        <div class="tv-content">
          <h1 class="tv-name"><span id="rotating-hello" class="blue-underlined">Hello</span>,<br>I'm Arnav Somaghatta</h1>
          <p class="tv-description">"Nothing is impossible, if you just try."</p>
        </div>
      </div>
    </div>
  </div>

  <div class="navbar" id="main-navbar">
    <div class="navbar-container">
      <button class="menu-toggle" aria-label="Toggle navigation">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <div class="nav-links">
        <a href="index.html" class="nav-item">Home</a>
        <a href="../about-me/about-me.html" class="nav-item">About Me</a>
        <a href="../services/services.html" class="nav-item">Services</a>
        <a href="../project-timeline/project-timeline.html" class="nav-item">Project Timeline</a>
        <a href="../contact/contact.html" class="nav-item contact-btn">Contact Me</a>
      </div>
    </div>
  </div>

  <script src="../menu.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const splashScreen = document.getElementById('splash-screen');
      const rotatingHello = document.getElementById('rotating-hello');

      const hellos = [
        "Hello", "Hola", "Bonjour", "Ciao", "Hallo", "Olá", "Hej", "Hei", "Cześć", "Ahoj", "Szia", "Yasou", "Privet", "Pryvit", "Marhaba", "Shalom", "Merhaba", "Salam", "Namaste","Nomoskar", "Ni hao", "Konnichiwa", "Annyeong", "Jambo", "Sawubona", "Aloha"
      ];
      let currentHelloIndex = 0;

      function rotateHello() {
        rotatingHello.style.opacity = '0';
        setTimeout(() => {
          currentHelloIndex = (currentHelloIndex + 1) % hellos.length;
          rotatingHello.textContent = hellos[currentHelloIndex];
          rotatingHello.style.opacity = '1';
        }, 300);
      }

      setTimeout(() => {
        setInterval(rotateHello, 1500);
      }, 2500);

      setTimeout(() => {
        splashScreen.style.zIndex = '1';
        
        window.dispatchEvent(new Event('resize'));
      }, 3500);
    });
  </script>
</body>
</html>
