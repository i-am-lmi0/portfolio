<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../index.css">
  <link rel="icon" href="../img/logo.png" type="image/png">
  <title>Contact Me</title>
  <style>
    .contact-content {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="navbar-container">
      <button class="menu-toggle" aria-label="Toggle navigation">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <div class="nav-links">
        <a href="../home/index.html" class="nav-item">Home</a>
        <a href="../about-me/about-me.html" class="nav-item">About Me</a>
        <a href="../services/services.html" class="nav-item">Services</a>
        <a href="../project-timeline/project-timeline.html" class="nav-item">Project Timeline</a>
        <a href="../contact/contact.html" class="nav-item contact-btn">Contact Me</a>
      </div>
    </div>
  </div>
  
  <div class="container">
    <div class="contact-content">
      <h1 class="header">Get In Touch</h1>
      
      <div class="local-time">
        <h3>Local Time</h3>
        <p id="current-time">Loading...</p>
      </div>
      
      <div class="contact-grid">
        <div class="contact-item">
          <div class="contact-icon">
            <img src="../img/email.png" alt="Email" class="contact-logo">
          </div>
          <div class="contact-info">
            <h3>Email</h3>
            <a href="mailto:arnav@somaghatta.com" class="contact-link">arnav@somaghatta.com</a>
          </div>
        </div>
        
        <div class="contact-item">
          <div class="contact-icon">
            <img src="../img/github.png" alt="GitHub" class="contact-logo">
          </div>
          <div class="contact-info">
            <h3>GitHub</h3>
            <a href="https://github.com/i-am-lmi0" target="_blank" class="contact-link">github.com/i-am-lmi0</a>
          </div>
        </div>
        
        <div class="contact-item">
          <div class="contact-icon">
            <img src="../img/discord.webp" alt="Discord" class="contact-logo">
          </div>
          <div class="contact-info">
            <h3>Discord</h3>
            <a href="https://discord.com/users/1059882387590365314" target="_blank" class="contact-link">theofficialtruck</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    function updateTime() {
      const now = new Date();
      
      const dateOptions = {
        timeZone: 'America/New_York',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      };
      
      const timeOptions = {
        timeZone: 'America/New_York',
        hour12: true,
        hour: 'numeric',
        minute: '2-digit'
      };
      
      const dateString = now.toLocaleString('en-US', dateOptions);
      const timeString = now.toLocaleString('en-US', timeOptions);
      
      document.getElementById('current-time').innerHTML = 
        `${dateString}<br>${timeString}`;
    }
    
    updateTime();
    setInterval(updateTime, 60000);
  </script>
  
  <script src="../menu.js"></script>
</body>
</html>
