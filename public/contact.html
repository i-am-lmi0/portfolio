<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css" type="text/css">
  <link rel="icon" href="./img/logo.png" type="image/png">
  <title>Contact Me</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="navbar">
    <div class="left-buttons">
      <a href="index.html" class="button">Home</a>
      <a href="about-me.html" class="button">About Me</a>
      <a href="services.html" class="button">Services</a>
      <a href="project-timeline.html" class="button">Project Timeline</a>
    </div>
    <div class="link-navbar">
      <a href="contact.html" class="link">Contact Me</a>
    </div>
  </div>
  
  <div class="container">
    <div class="contact-content">
      <h1 class="header">Get In Touch</h1>
      
      <div class="local-time">
        <h3>Local Time</h3>
        <p id="current-time">Loading...</p>
      </div>
      
      <div class="contact-grid">
        <div class="contact-item">
          <div class="contact-icon">
            <img src="./img/email.png" alt="Email" class="contact-logo">
          </div>
          <div class="contact-info">
            <h3>Email</h3>
            <a href="mailto:arnav@somaghatta.com" class="contact-link">arnav@somaghatta.com</a>
          </div>
        </div>
        
        <div class="contact-item">
          <div class="contact-icon">
            <img src="./img/github.png" alt="GitHub" class="contact-logo">
          </div>
          <div class="contact-info">
            <h3>GitHub</h3>
            <a href="https://github.com/i-am-lmi0" target="_blank" class="contact-link">github.com/i-am-lmi0</a>
          </div>
        </div>
        
        <div class="contact-item">
          <div class="contact-icon">
            <img src="./img/discord.webp" alt="Discord" class="contact-logo">
          </div>
          <div class="contact-info">
            <h3>Discord</h3>
            <a href="https://discord.com/users/1059882387590365314" target="_blank" class="contact-link">theofficialtruck</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    function updateTime() {
      const now = new Date();
      
      const dateOptions = {
        timeZone: 'America/New_York',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      };
      
      const timeOptions = {
        timeZone: 'America/New_York',
        hour12: true,
        hour: 'numeric',
        minute: '2-digit'
      };
      
      const dateString = now.toLocaleString('en-US', dateOptions);
      const timeString = now.toLocaleString('en-US', timeOptions);
      
      document.getElementById('current-time').innerHTML = 
        `${dateString}<br>${timeString}`;
    }
    
    updateTime();
    setInterval(updateTime, 60000);
  </script>
  
  <style>
    .contact-content {
      max-width: 1600px;
      margin: 0 auto;
      text-align: center;
    }
    
    .header {
      text-align: center !important;
    }
    
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }
    
    .contact-item {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.4) 0%, rgba(20, 20, 40, 0.4) 100%);
      border: 2px solid #f09235;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 1;
    }
    
    .contact-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(240, 146, 53, 0.3);
      border-color: #ff6b6b;
      z-index: 2;
    }
    
    .contact-icon {
      margin-bottom: 20px;
    }
    
    .contact-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      background: rgba(240, 146, 53, 0.1);
      border-radius: 8px;
      padding: 8px;
    }
    
    .contact-info h3 {
      color: #f09235;
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: 700;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    
    .contact-link {
      color: #f09235;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-block;
      padding: 8px 16px;
      border: 2px solid #f09235;
      border-radius: 25px;
      background: rgba(240, 146, 53, 0.1);
    }
    
    .contact-link:hover {
      background: #f09235;
      color: #000000;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(240, 146, 53, 0.5);
    }
    
    .local-time {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.4) 0%, rgba(20, 20, 40, 0.4) 100%);
      border: 2px solid #f09235;
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      margin-bottom: 40px;
    }
    
    .local-time h3 {
      color: #f09235;
      font-size: 18px;
      margin-bottom: 15px;
      font-weight: 700;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    
    .local-time p {
      color: #f09235;
      font-size: 16px;
      font-weight: 600;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      line-height: 1.4;
    }
    
    @media (max-width: 768px) {
      .contact-content {
        max-width: 100%;
        padding: 0 20px;
      }
      
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      
      .contact-item {
        padding: 30px;
      }
      
      .contact-logo {
        width: 36px;
        height: 36px;
      }
      
      .contact-info h3 {
        font-size: 18px;
      }
      
      .contact-link {
        font-size: 14px;
        padding: 6px 12px;
      }
      
      .local-time {
        padding: 20px;
        margin-bottom: 20px;
      }
    }
    
    @media (max-width: 480px) {
      .contact-content {
        padding: 0 15px;
      }
      
      .contact-grid {
        gap: 15px;
      }
      
      .contact-item {
        padding: 25px;
      }
      
      .contact-logo {
        width: 32px;
        height: 32px;
      }
      
      .contact-info h3 {
        font-size: 16px;
      }
      
      .contact-link {
        font-size: 13px;
        padding: 5px 10px;
      }
      
      .local-time {
        padding: 15px;
      }
    }
  </style>
</body>
</html>
